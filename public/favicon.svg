<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="8" fill="#090609"/>
  <defs>
    <linearGradient id="sunset" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#F7C948"/>
      <stop offset="100%" style="stop-color:#E84393"/>
    </linearGradient>
    <linearGradient id="stroke-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#F7C948"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(50, 50)">
    <!-- Losange extérieur -->
    <polygon points="0,-40 40,0 0,40 -40,0" fill="none" stroke="url(#stroke-grad)" stroke-width="3"/>
    <!-- Losange intérieur -->
    <polygon points="0,-28 28,0 0,28 -28,0" fill="none" stroke="url(#stroke-grad)" stroke-width="1.5" opacity="0.4"/>
    <!-- M stylisé -->
    <g filter="url(#glow)">
      <path d="M-14,12 L-14,-10 L-5,4 L0,-4 L5,4 L14,-10 L14,12"
            fill="none" stroke="url(#sunset)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
